schema_version = "1.0"
min_rows = 1
required_columns = [
  "id",
  "title",
  "apply_url",
  "posted_at",
  "source",
  "source_ref",
  "source_job_id",
  "source_payload_hash",
]

location_or_remote_signal_min = 0.85

[null_thresholds]
id = 0.00
title = 0.00
apply_url = 0.00
source_job_id = 0.00
company = 0.05
description_text = 0.10
posted_at = 0.10

[freshness]
posted_at_max_age_days = 36500
source_updated_at_max_age_days = 36500

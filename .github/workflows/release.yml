name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (must match src/honestroles/__about__.py)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYPI_API_KEY: ${{ secrets.PYPI_API_KEY || secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fast pre-commit checks
        run: |
          python -m pip install --upgrade pip pre-commit
          bash scripts/run_precommit_fast.sh

      - name: Validate requested version and package version
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          requested = os.environ["REQUESTED_VERSION"]
          if not re.fullmatch(r"\d+\.\d+\.\d+", requested):
              sys.exit(
                  f"Requested version '{requested}' must match <major>.<minor>.<patch>."
              )

          about_text = Path("src/honestroles/__about__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', about_text)
          if not match:
              sys.exit("Could not find __version__ in src/honestroles/__about__.py")
          version = match.group(1)
          if requested != version:
              sys.exit(
                  f"Requested version {requested} does not match package version {version}."
              )
          print("Version check passed.")
          PY
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          rm -rf dist/*
          python -m build
          python -m twine check dist/*

      - name: Validate PyPI token secret
        run: |
          if [ -z "${PYPI_API_KEY}" ]; then
            echo "Missing PyPI token secret. Set PYPI_API_KEY (or PYPI_API_TOKEN) in repository secrets."
            exit 1
          fi

      - name: Publish to PyPI
        run: |
          TWINE_USERNAME=__token__ \
          TWINE_PASSWORD="${PYPI_API_KEY}" \
          python -m twine upload dist/*
